# ===============================
# Active profile
# ===============================
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ===============================
# Server
# ===============================
server.port=${PORT:8080}

# ===============================
# DataSource Configuration
# ===============================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/cabinetplusdb2}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# Hibernate / JPA
# ===============================
spring.jpa.open-in-view=false

# ===============================
# Jackson
# ===============================
spring.jackson.deserialization.fail-on-unknown-properties=true

# ===============================
# Field-level encryption (envelope)
# ===============================
# Required in production: base64-encoded AES key (16/24/32 bytes) used to wrap per-value DEKs.
# Provide via env var CABINETPLUS_KMS_KEK_BASE64 or JVM system property cabinetplus.crypto.kek-base64.

# ===============================
# Liquibase
# ===============================
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

# ===============================
# JWT Configuration
# ===============================
jwt.secret=${JWT_SECRET:}
jwt.access.expiration-ms=600000
jwt.refresh.expiration-ms=31536000000

# ===============================
# Uploads
# ===============================
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=500MB
app.documents.upload-dir=uploads/documents
app.protheses.files-upload-dir=uploads/protheses/files
app.protheses.stl-upload-dir=uploads/protheses/stl

# ===============================
# Twilio Configuration
# ===============================
twilio.account.sid=${TWILIO_SID:}
twilio.auth.token=${TWILIO_TOKEN:}
twilio.verify.service.sid=${TWILIO_VERIFY_SERVICE_SID:}

# ===============================
# CORS / Cookies
# ===============================
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,https://cabinetplusdz.com,https://www.cabinetplusdz.com,https://cabinetplus.vercel.app}
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:https://*.vercel.app}
app.cookie.secure=${APP_COOKIE_SECURE:false}
app.cookie.same-site=${APP_COOKIE_SAME_SITE:Lax}
app.public-pdf-link.ttl-seconds=${APP_PUBLIC_PDF_LINK_TTL_SECONDS:900}

# ===============================
# Web Push (VAPID) - optional
# ===============================
# Generate VAPID keys and provide via env vars to enable.
app.webpush.public-key=${APP_WEBPUSH_PUBLIC_KEY:}
app.webpush.private-key=${APP_WEBPUSH_PRIVATE_KEY:}
app.webpush.subject=${APP_WEBPUSH_SUBJECT:mailto:support@cabinetplusdz.com}

# ===============================
# OTP / SMS
# ===============================
app.otp.cooldown-seconds=${APP_OTP_COOLDOWN_SECONDS:60}
app.login-2fa.challenge-ttl-seconds=${APP_LOGIN_2FA_CHALLENGE_TTL_SECONDS:300}
