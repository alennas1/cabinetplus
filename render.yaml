services:
  - type: web
    name: cabinetplus-backend
    runtime: java
    rootDir: backend
    plan: free
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/backend-0.0.1-SNAPSHOT.jar
    healthCheckPath: /auth/session
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: APP_COOKIE_SECURE
        value: true
      - key: APP_COOKIE_SAME_SITE
        value: None
