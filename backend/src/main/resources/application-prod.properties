spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=validate
spring.mail.properties.mail.debug=false
app.cookie.secure=true
app.cookie.same-site=None
spring.datasource.hikari.data-source-properties.preferQueryMode=simple

# Field-level encryption key (required)
# - Env: CABINETPLUS_KMS_KEK_BASE64
# - Or JVM: -Dcabinetplus.crypto.kek-base64=...

# Bootstrap admin (opt-in; set via env vars in production when you need to create the first admin)
# - APP_BOOTSTRAP_ADMIN_ENABLED=true
# - APP_BOOTSTRAP_ADMIN_PHONE_NUMBER=055...
# - APP_BOOTSTRAP_ADMIN_PASSWORD=...
# - APP_BOOTSTRAP_ADMIN_UPDATE_PASSWORD=false
