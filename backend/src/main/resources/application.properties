# ===============================
# Active profile
# ===============================
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ===============================
# Server
# ===============================
server.port=${PORT:8080}

# ===============================
# DataSource Configuration
# ===============================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/cabinetplusdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:newStrongPassword}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# Hibernate / JPA
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# ===============================
# JWT Configuration
# ===============================
jwt.secret=${JWT_SECRET:3zQnXLz+v0Wm+9j8fH9Sv+rb3VbA9M/cD4xPTfFhM7Y=}
jwt.access.expiration-ms=600000
jwt.refresh.expiration-ms=31536000000

# ===============================
# Mail Configuration
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=${MAIL_PORT:465}
spring.mail.username=cabinetplusofficiel@gmail.com
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# ===============================
# Uploads
# ===============================
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB
app.documents.upload-dir=uploads/documents

# ===============================
# Twilio Configuration
# ===============================
twilio.account.sid=${TWILIO_SID:}
twilio.auth.token=${TWILIO_TOKEN:}
twilio.phone.number=${TWILIO_PHONE_NUMBER:+14059373429}

# ===============================
# CORS / Cookies
# ===============================
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,https://cabinetplusdz.com,https://www.cabinetplusdz.com,https://cabinetplus.vercel.app}
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:https://*.vercel.app}
app.cookie.secure=${APP_COOKIE_SECURE:false}
app.cookie.same-site=${APP_COOKIE_SAME_SITE:Lax}
