# ===============================
# Development defaults (LOCAL ONLY)
# ===============================
# Never deploy with SPRING_PROFILES_ACTIVE=dev.
# This file intentionally contains DEV-ONLY defaults to avoid having to set env vars locally.

# Local DB defaults (override via env)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/cabinetplusdb2}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:newStrongPassword}

# JWT secret (base64, >= 32 bytes after decoding). DEV ONLY.
jwt.secret=${JWT_SECRET:kohFSaXvIaY9qXRmN9DT+2OR1h5qxIWWeRWwfdWitPU=}

# Seed is opt-in (dev profile only). If enabled, passwords must be provided via env or this file.
app.seed.enabled=false
app.seed.default-admin=false
app.seed.default-dentist=false
